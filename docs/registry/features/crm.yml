schema_version: "2.0.0"
system_id: crm
system_name: 私域运营

features:

  - feature_id: crm_field_management
    name: 自定义字段管理
    purpose: 定义和管理内容/用户的自定义属性字段，支持私域标签体系
    maturity: 2
    code:
      root: apps/api/src/controllers/
      entry_files: [fields.controller.ts]
      language: TypeScript
      runtime: node
    docs:
      prd: null
      dod: null
      adr: null
      api_doc: docs/registry/api-registry.yml#fields
      runbook: null
    skills: []
    apis:
      - service: api
        endpoints:
          - "GET /api/fields"
          - "POST /api/fields"
          - "PUT /api/fields/:id"
          - "DELETE /api/fields/:id"
      - service: creator
        endpoints:
          - "GET /api/properties"
          - "POST /api/properties"
          - "PATCH /api/properties/{prop_id}"
    tests:
      unit:
        - apps/dashboard/src/pages/__tests__/FieldManagementPage.test.tsx
      integration: []
      e2e: []
      regression: []
    ci:
      jobs: []
      layers: [L3]
    runtime: {}
    capabilities:
      - id: crm_field_management.schema
        name: 字段 schema 定义
        entry_file: fields.controller.ts
        maturity: 2
        tests:
          unit: []
          integration: []
          e2e: []
        status: active
      - id: crm_field_management.crud
        name: 字段值增删改查
        entry_file: fields.controller.ts
        maturity: 2
        tests:
          unit:
            - apps/dashboard/src/pages/__tests__/FieldManagementPage.test.tsx
          integration: []
          e2e: []
        status: active
      - id: crm_field_management.validation
        name: 字段值验证
        entry_file: fields.controller.ts
        maturity: 2
        tests:
          unit: []
          integration: []
          e2e: []
        status: active

