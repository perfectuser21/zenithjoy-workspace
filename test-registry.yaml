# Test Registry — ZenithJoy
# SSOT for all test files. Every *.test.* / *.spec.* file must be registered here.
# CI L2 (orphan-test-check) enforces this: unregistered tests block PR merge.
#
# Fields:
#   id       — unique identifier (kebab-case)
#   path     — relative path from repo root
#   type     — unit | integration | e2e
#   ci       — L3 | L4
#   status   — active | deprecated | pending-ci
#   product  — 中台认证 | 新媒体运营 | 私域运营 | AI员工 | AI视频
#   note     — optional context
#
# Taxonomy:
#   unit        — single module, deps mocked, no I/O. Runs in L3.
#   integration — crosses a real boundary (DB/HTTP). Runs in L4.
#   e2e         — full workflow from external perspective. Runs in L4.

