name: L1 Process Gate

# L1: 流程检查 — 每个 PR 必跑（~2min）
# 职责：PR 标题格式、commit message 规范

on:
  pull_request:
    branches: [main]

concurrency:
  group: l1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: PR Title Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check PR title follows conventional commits
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $TITLE"

          # Conventional commits pattern: type(scope): description
          # type: feat, fix, docs, chore, test, refactor, style, ci, perf, build
          if echo "$TITLE" | grep -qE "^(feat|fix|docs|chore|test|refactor|style|ci|perf|build)(\(.+\))?!?:"; then
            echo "PR title follows conventional commits format"
          else
            echo ""
            echo "PR title does not follow conventional commits format"
            echo ""
            echo "Expected: <type>(<scope>): <description>"
            echo "Types: feat, fix, docs, chore, test, refactor, style, ci, perf, build"
            echo "Examples:"
            echo "  feat(dashboard): add user profile page"
            echo "  fix(api): handle null response from database"
            echo "  docs: update README"
            exit 1
          fi

  # ─── Frontend Browser DoD Check ──────────────────────────────────────

  frontend-browser-dod-check:
    name: Frontend Browser DoD Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect frontend changes and check browser DoD
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Frontend Browser DoD Check"
          echo "  Branch: $BRANCH"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          BASE_REF="${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD)

          if ! echo "$CHANGED" | grep -qE "^apps/dashboard/|^apps/api/"; then
            echo "无前端文件改动，跳过浏览器验证检查"
            exit 0
          fi

          echo "检测到前端文件改动，检查 DoD 是否含浏览器验证步骤..."

          # 定位 DoD / Task Card 文件
          DOD_FILE=""
          if [ -f ".task-${BRANCH}.md" ]; then
            DOD_FILE=".task-${BRANCH}.md"
          elif [ -f ".dod-${BRANCH}.md" ]; then
            DOD_FILE=".dod-${BRANCH}.md"
          elif [ -f ".dod.md" ]; then
            DOD_FILE=".dod.md"
          fi

          if [ -z "$DOD_FILE" ]; then
            echo "⚠️  未找到 DoD 文件，跳过浏览器验证检查"
            exit 0
          fi

          echo "DoD 文件: $DOD_FILE"

          # 检查浏览器验证关键词：manual:chrome: / localhost:3001
          if grep -q "manual:chrome:\|localhost:3001" "$DOD_FILE"; then
            echo "✅ 找到浏览器验证步骤，检查通过"
            grep -n "manual:chrome:\|localhost:3001" "$DOD_FILE" | head -5
            exit 0
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ❌ Frontend Browser DoD Check FAILED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "  本 PR 修改了前端文件，但 DoD 中未找到浏览器验证步骤。"
          echo ""
          echo "  请在 DoD 的 [BEHAVIOR] 条目中添加（至少一个）："
          echo "    Test: manual:chrome: 打开 http://localhost:3001/xxx → 验证主流程"
          echo ""
          exit 1

  # ─── L1 Gate ──────────────────────────────────────────────────────────
  l1-passed:
    name: L1 Process Gate Passed
    needs: [pr-title, frontend-browser-dod-check]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: L1 Process Gate
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L1 Process Gate"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          FAILED=false

          if [ "${{ needs.pr-title.result }}" != "success" ]; then
            echo "FAIL: PR Title Format (${{ needs.pr-title.result }})"
            FAILED=true
          fi

          if [ "${{ needs.frontend-browser-dod-check.result }}" != "success" ]; then
            echo "FAIL: Frontend Browser DoD Check (${{ needs.frontend-browser-dod-check.result }})"
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  L1 Process Gate FAILED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L1 Process Gate PASSED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
