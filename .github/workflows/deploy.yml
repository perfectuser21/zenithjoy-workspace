name: Deploy to HK VPS

on:
  push:
    branches: [main]
    paths:
      - 'apps/dashboard/**'
      - 'apps/api/**'

jobs:
  deploy:
    name: Build & Deploy Dashboard
    runs-on: [self-hosted, hk-vps]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # npm ci 存在 rollup platform-specific optional deps bug
          # (https://github.com/npm/cli/issues/4828) — ci 返回 0 但不真装
          # 平台 binary。只能删干净用 npm install 从零装。
          rm -rf "apps/dashboard/node_modules" "node_modules"
          npm install --include=optional --workspace=apps/dashboard || {
            echo "npm install failed"
            exit 1
          }
          # 双保险：显式补装 linux x64 rollup binary（若上一步仍漏）
          npm install @rollup/rollup-linux-x64-gnu --workspace=apps/dashboard --no-save --no-package-lock || true

      - name: Build dashboard
        run: npm run build --workspace=apps/dashboard

      - name: Deploy to VPS
        run: |
          rsync -avz --delete apps/dashboard/dist/ /opt/zenithjoy/autopilot-dashboard/dist/
          echo "✅ dist synced"

      - name: Restart container
        run: |
          docker restart autopilot-prod
          echo "✅ autopilot-prod restarted"
