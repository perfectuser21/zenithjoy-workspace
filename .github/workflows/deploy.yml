name: Deploy to HK VPS

on:
  push:
    branches: [main]
    paths:
      - 'apps/dashboard/**'
      - 'apps/api/**'

jobs:
  deploy:
    name: Build & Deploy Dashboard
    runs-on: [self-hosted, hk-vps]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # npm ci 对 rollup 的 platform-specific optional deps 有 bug
          # (https://github.com/npm/cli/issues/4828)，若失败回退到 npm install
          if ! npm ci --include=optional --workspace=apps/dashboard; then
            echo "npm ci failed (rollup optional deps bug), fallback to npm install"
            # 明确限定路径范围，避免 rm -rf 意外
            rm -rf "apps/dashboard/node_modules" "node_modules"
            npm install --include=optional --workspace=apps/dashboard || {
              echo "fallback install also failed"
              exit 1
            }
          fi

      - name: Build dashboard
        run: npm run build --workspace=apps/dashboard

      - name: Deploy to VPS
        run: |
          rsync -avz --delete apps/dashboard/dist/ /opt/zenithjoy/autopilot-dashboard/dist/
          echo "✅ dist synced"

      - name: Restart container
        run: |
          docker restart autopilot-prod
          echo "✅ autopilot-prod restarted"
