name: L4 Runtime Gate

# L4: 运行时测试 — 按模块变更触发（~10min）
# 职责：单元测试 + Coverage 报告

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: l4-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Change Detection ────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      api: ${{ steps.filter.outputs.api }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed modules
        id: filter
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"

          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "dashboard=true" >> $GITHUB_OUTPUT
              echo "api=true" >> $GITHUB_OUTPUT
              echo "ci=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          else
            BASE_REF="${{ github.base_ref }}"
            CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD" 2>/dev/null || echo "")
          fi

          echo "$CHANGED" | grep -q "^apps/dashboard/" \
            && echo "dashboard=true" >> $GITHUB_OUTPUT || echo "dashboard=false" >> $GITHUB_OUTPUT
          echo "$CHANGED" | grep -q "^apps/api/" \
            && echo "api=true" >> $GITHUB_OUTPUT || echo "api=false" >> $GITHUB_OUTPUT
          echo "$CHANGED" | grep -qE "^\.github/|^tsconfig\.base\.json$|^package\.json$" \
            && echo "ci=true" >> $GITHUB_OUTPUT || echo "ci=false" >> $GITHUB_OUTPUT

  # ─── Dashboard Tests ─────────────────────────────────────────────────
  dashboard-test:
    name: Dashboard Test
    needs: changes
    if: needs.changes.outputs.dashboard == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json
      - run: npm ci
        working-directory: apps/dashboard
      - name: Run tests with coverage
        working-directory: apps/dashboard
        run: npx vitest run --coverage

  # ─── API Tests ───────────────────────────────────────────────────────
  api-test:
    name: API Test
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --workspace=apps/api
      - name: Run tests with coverage
        working-directory: apps/api
        run: npx vitest run --coverage

  # ─── L4 Gate ──────────────────────────────────────────────────────────
  l4-passed:
    name: L4 Runtime Gate Passed
    needs: [changes, dashboard-test, api-test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: L4 Runtime Gate
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L4 Runtime Gate"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          FAILED=false

          if [ "${{ needs.changes.result }}" = "failure" ]; then
            echo "FAIL: Detect Changes"
            FAILED=true
          fi

          # Dashboard tests (conditional)
          if [ "${{ needs.changes.outputs.dashboard }}" = "true" ] || [ "${{ needs.changes.outputs.ci }}" = "true" ]; then
            if [ "${{ needs.dashboard-test.result }}" != "success" ]; then
              echo "FAIL: Dashboard Test (${{ needs.dashboard-test.result }})"
              FAILED=true
            fi
          fi

          # API tests (conditional)
          if [ "${{ needs.changes.outputs.api }}" = "true" ] || [ "${{ needs.changes.outputs.ci }}" = "true" ]; then
            if [ "${{ needs.api-test.result }}" != "success" ]; then
              echo "FAIL: API Test (${{ needs.api-test.result }})"
              FAILED=true
            fi
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  L4 Runtime Gate FAILED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo ""
          echo "Module check results:"
          [ "${{ needs.changes.outputs.dashboard }}" = "true" ] && echo "  Dashboard: tested" || echo "  Dashboard: skipped"
          [ "${{ needs.changes.outputs.api }}" = "true" ] && echo "  API: tested" || echo "  API: skipped"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L4 Runtime Gate PASSED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
