name: Auto Version

# 合并到 main 后根据 commit 前缀自动 bump 根 package.json 版本号
# fix:   → patch (+0.0.1)
# feat:  → minor (+0.1.0)
# feat!: / BREAKING: → major (+1.0.0)
# 其他（docs:/chore:/test:）→ 不 bump

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'services/**'

jobs:
  bump:
    name: Auto Bump Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if commit is auto-version
        id: check
        run: |
          MSG=$(git log -1 --pretty=%s)
          if echo "$MSG" | grep -q "chore: auto-version"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine bump type from commit message
        if: steps.check.outputs.skip == 'false'
        id: bump
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -qE '^feat(\(.+\))?!:|^BREAKING'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qE '^feat(\(.+\))?:'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qE '^fix(\(.+\))?:'; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "type=none" >> $GITHUB_OUTPUT
          fi

      - name: Bump version in root package.json
        if: steps.check.outputs.skip == 'false' && steps.bump.outputs.type != 'none'
        run: |
          BUMP_TYPE="${{ steps.bump.outputs.type }}"
          echo "Bump type: $BUMP_TYPE"

          CURRENT=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "Current version: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Create version bump PR
        if: steps.check.outputs.skip == 'false' && steps.bump.outputs.type != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --cached --quiet && exit 0

          NEW_VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          BRANCH_NAME="auto-version-bump-${NEW_VERSION}"

          git push origin --delete "$BRANCH_NAME" 2>/dev/null || true
          git checkout -b "$BRANCH_NAME"
          git commit -m "chore: auto-version ${{ steps.bump.outputs.type }} bump to ${NEW_VERSION}"
          git push -u origin "$BRANCH_NAME"

          PR_TITLE="chore: auto-version ${{ steps.bump.outputs.type }} bump to ${NEW_VERSION}"
          PR_BODY="Automated version bump to ${NEW_VERSION}."

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            2>&1) \
            || PR_URL=$(gh pr view "$BRANCH_NAME" --json url -q '.url' 2>/dev/null \
               || echo "PR creation failed and no existing PR found")

          echo "PR URL: $PR_URL"

          gh pr merge "$BRANCH_NAME" --squash --auto --delete-branch \
            || echo "Note: auto-merge request failed. PR: $PR_URL"
