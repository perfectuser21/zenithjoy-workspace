name: L3 Code Gate

# L3: 代码质量检查 — 按模块变更触发（~5min）
# 职责：Lint、TypeCheck、Build、Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: l3-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Change Detection ────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      api: ${{ steps.filter.outputs.api }}
      geoai: ${{ steps.filter.outputs.geoai }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed modules
        id: filter
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"

          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "dashboard=true" >> $GITHUB_OUTPUT
              echo "api=true" >> $GITHUB_OUTPUT
              echo "geoai=true" >> $GITHUB_OUTPUT
              echo "ci=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          else
            BASE_REF="${{ github.base_ref }}"
            CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD" 2>/dev/null || echo "")
          fi

          echo "$CHANGED" | grep -q "^apps/dashboard/" \
            && echo "dashboard=true" >> $GITHUB_OUTPUT || echo "dashboard=false" >> $GITHUB_OUTPUT
          echo "$CHANGED" | grep -q "^apps/api/" \
            && echo "api=true" >> $GITHUB_OUTPUT || echo "api=false" >> $GITHUB_OUTPUT
          echo "$CHANGED" | grep -q "^apps/geoai/" \
            && echo "geoai=true" >> $GITHUB_OUTPUT || echo "geoai=false" >> $GITHUB_OUTPUT
          echo "$CHANGED" | grep -qE "^\.github/|^tsconfig\.base\.json$|^package\.json$" \
            && echo "ci=true" >> $GITHUB_OUTPUT || echo "ci=false" >> $GITHUB_OUTPUT

  # ─── Dashboard ───────────────────────────────────────────────────────
  dashboard-lint:
    name: Dashboard Lint
    needs: changes
    if: needs.changes.outputs.dashboard == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json
      - run: npm ci
        working-directory: apps/dashboard
      - run: npx eslint . --max-warnings 79
        working-directory: apps/dashboard

  dashboard-typecheck:
    name: Dashboard Typecheck
    needs: changes
    if: needs.changes.outputs.dashboard == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json
      - run: npm ci
        working-directory: apps/dashboard
      - run: npx tsc --noEmit
        working-directory: apps/dashboard

  dashboard-build:
    name: Dashboard Build
    needs: changes
    if: needs.changes.outputs.dashboard == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json
      - run: npm ci
        working-directory: apps/dashboard
      - name: Fix rollup optional deps (npm ci bug workaround)
        working-directory: apps/dashboard
        run: node -e "try{require('@rollup/rollup-linux-x64-gnu')}catch(e){require('child_process').execSync('npm install --no-save @rollup/rollup-linux-x64-gnu',{stdio:'inherit'})}" || true
      - run: mkdir -p apps/dashboard/public/gallery/chatgpt-cards apps/dashboard/public/gallery/deep-post-cards
      - run: npm run build
        working-directory: apps/dashboard
        env:
          CORE_FEATURES_PATH: ./src/stubs/core-features
      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: dashboard-dist
          path: apps/dashboard/dist
          retention-days: 7

  # ─── API ─────────────────────────────────────────────────────────────
  api-lint:
    name: API Lint
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --workspace=apps/api
      - run: npx eslint src/ --max-warnings 30
        working-directory: apps/api

  api-typecheck:
    name: API Typecheck
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --workspace=apps/api
      - run: npx tsc --noEmit
        working-directory: apps/api

  # ─── GeoAI ──────────────────────────────────────────────────────────
  geoai-build:
    name: GeoAI Build
    needs: changes
    if: needs.changes.outputs.geoai == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Fix Linux native optional deps missing from macOS-generated lock file
        run: |
          npm install --no-save @rollup/rollup-linux-x64-gnu lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu 2>/dev/null || true
          src="node_modules/lightningcss-linux-x64-gnu/lightningcss.linux-x64-gnu.node"
          dst="node_modules/lightningcss/lightningcss.linux-x64-gnu.node"
          [ -f "$src" ] && [ ! -f "$dst" ] && cp "$src" "$dst" || true
      - run: npm run build
        working-directory: apps/geoai

  # ─── Security ────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json
      - run: npm ci
        working-directory: apps/dashboard
      - run: npm audit --audit-level=moderate --omit=dev
        working-directory: apps/dashboard

  # ─── L3 Gate ──────────────────────────────────────────────────────────
  l3-passed:
    name: L3 Code Gate Passed
    needs:
      - changes
      - dashboard-lint
      - dashboard-typecheck
      - dashboard-build
      - api-lint
      - api-typecheck
      - geoai-build
      - security
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: L3 Code Gate
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L3 Code Gate"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          FAILED=false

          if [ "${{ needs.changes.result }}" = "failure" ]; then
            echo "FAIL: Detect Changes"
            FAILED=true
          fi

          # Dashboard (conditional)
          if [ "${{ needs.changes.outputs.dashboard }}" = "true" ] || [ "${{ needs.changes.outputs.ci }}" = "true" ]; then
            for job_result in \
              "Dashboard Lint:${{ needs.dashboard-lint.result }}" \
              "Dashboard Typecheck:${{ needs.dashboard-typecheck.result }}" \
              "Dashboard Build:${{ needs.dashboard-build.result }}"; do
              NAME="${job_result%%:*}"
              RESULT="${job_result##*:}"
              if [ "$RESULT" != "success" ]; then
                echo "FAIL: $NAME ($RESULT)"
                FAILED=true
              fi
            done
          fi

          # API (conditional)
          if [ "${{ needs.changes.outputs.api }}" = "true" ] || [ "${{ needs.changes.outputs.ci }}" = "true" ]; then
            for job_result in \
              "API Lint:${{ needs.api-lint.result }}" \
              "API Typecheck:${{ needs.api-typecheck.result }}"; do
              NAME="${job_result%%:*}"
              RESULT="${job_result##*:}"
              if [ "$RESULT" != "success" ]; then
                echo "FAIL: $NAME ($RESULT)"
                FAILED=true
              fi
            done
          fi

          # GeoAI (conditional)
          if [ "${{ needs.changes.outputs.geoai }}" = "true" ] || [ "${{ needs.changes.outputs.ci }}" = "true" ]; then
            if [ "${{ needs.geoai-build.result }}" != "success" ]; then
              echo "FAIL: GeoAI Build (${{ needs.geoai-build.result }})"
              FAILED=true
            fi
          fi

          # Security (always)
          if [ "${{ needs.security.result }}" != "success" ]; then
            echo "FAIL: Security Audit (${{ needs.security.result }})"
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  L3 Code Gate FAILED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo ""
          echo "Module check results:"
          [ "${{ needs.changes.outputs.dashboard }}" = "true" ] && echo "  Dashboard: checked" || echo "  Dashboard: skipped"
          [ "${{ needs.changes.outputs.api }}" = "true" ] && echo "  API: checked" || echo "  API: skipped"
          [ "${{ needs.changes.outputs.geoai }}" = "true" ] && echo "  GeoAI: checked" || echo "  GeoAI: skipped"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  L3 Code Gate PASSED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
