services:
  autopilot-dashboard:
    image: nginx:alpine
    container_name: autopilot-dashboard
    restart: unless-stopped
    ports:
      - "5211:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
