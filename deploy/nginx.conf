server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;


    # 内容图片代理 — 转发到 Mac mini 图片服务器（Tailscale）
    location /content-images/ {
        proxy_pass http://100.71.151.105:9998/images/;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    # 飞书登录 API — 路由到 feishu-login 容器（host port 5690）
    location = /api/feishu-login {
        proxy_pass http://172.22.0.4:5690/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30;
    }

    # Brain API
    location /api/brain/ {
        proxy_pass http://100.71.151.105:5221/api/brain/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300;
    }

    # ZenithJoy API (Mac via Tailscale)
    location /api/topics { proxy_pass http://100.71.151.105:8899; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/pacing { proxy_pass http://100.71.151.105:8899; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/pipelines { proxy_pass http://100.71.151.105:8899; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/ {
        proxy_pass http://100.71.151.105:5200/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30;
    }

    # Agent WebSocket — Agent 通过 wss://autopilot.zenjoymedia.media/agent-ws 连入 API（共享 5200 端口）
    location /agent-ws {
        proxy_pass http://100.71.151.105:5200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Douyin OAuth callback → Mac API
    location /auth/ {
        proxy_pass http://100.71.151.105:5200/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30;
    }

    # SPA 路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
