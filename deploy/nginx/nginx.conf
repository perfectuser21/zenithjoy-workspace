server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # N8N REST API proxy (HK N8N on localhost)
    location /api/n8n/ {
        proxy_pass http://host.docker.internal:5679/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # N8N Webhook proxy incl. feishu-login (HK N8N on localhost)
    location /api/n8n-webhook/ {
        proxy_pass http://host.docker.internal:5679/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Platform Data API proxy (NEW)
    location /api/media/ {
        proxy_pass http://host.docker.internal:5220/api/media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA routing support
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets caching
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
