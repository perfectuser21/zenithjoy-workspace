<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金诺AI - 文本标注</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #a5b4fc;
            --secondary: #10b981;
            --bg-dark: #0f172a;
            --bg-darker: #020617;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Inter, -apple-system, sans-serif;
            background: var(--bg-darker);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 64px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            z-index: 100;
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
        }
        .back-btn:hover {
            color: var(--text-primary);
            background: var(--bg-card);
        }
        .page-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .page-title i { color: var(--primary); }
        .progress-chip {
            padding: 6px 14px;
            background: var(--bg-card);
            border-radius: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .progress-chip .current { color: var(--primary-light); font-weight: 600; }
        .main-container {
            padding: 96px 32px 32px;
            max-width: 800px;
            margin: 0 auto;
        }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-item .value {
            font-size: 24px;
            font-weight: 700;
        }
        .stat-item .value.blue { color: var(--primary-light); }
        .stat-item .value.green { color: var(--success); }
        .stat-item .value.orange { color: var(--warning); }
        .stat-item .label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .task-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
        }
        .task-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .task-num {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .task-num span:first-child {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .task-num span:last-child {
            font-size: 15px;
            font-weight: 500;
        }
        .task-badge {
            padding: 4px 12px;
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-light);
            border-radius: 12px;
            font-size: 12px;
        }
        .text-box {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            font-size: 16px;
            line-height: 1.8;
            position: relative;
        }
        .text-box::before {
            content: '"';
            position: absolute;
            top: 8px;
            left: 12px;
            font-size: 36px;
            color: var(--primary);
            opacity: 0.3;
        }
        .label-section h4 {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .label-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .label-btn {
            padding: 16px;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .label-btn:hover { border-color: var(--text-muted); }
        .label-btn.selected.positive { border-color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .label-btn.selected.negative { border-color: var(--error); background: rgba(239, 68, 68, 0.1); }
        .label-btn.selected.neutral { border-color: var(--text-muted); background: rgba(100, 116, 139, 0.1); }
        .label-btn .icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .label-btn.positive .icon { color: var(--success); }
        .label-btn.negative .icon { color: var(--error); }
        .label-btn.neutral .icon { color: var(--text-muted); }
        .label-btn .text {
            font-size: 14px;
            font-weight: 500;
        }
        .action-bar {
            display: flex;
            justify-content: space-between;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .skip-btn {
            padding: 12px 20px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
        }
        .skip-btn:hover { background: var(--bg-dark); color: var(--text-primary); }
        .submit-btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .loading, .completed, .empty {
            text-align: center;
            padding: 60px;
        }
        .loading i, .completed i, .empty i {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .loading i { color: var(--primary); animation: spin 1s linear infinite; }
        .completed i { color: var(--success); }
        .empty i { color: var(--text-muted); }
        .loading p, .completed p, .empty p { color: var(--text-secondary); }
        .completed .btn, .empty .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 14px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast {
            position: fixed;
            top: 80px;
            right: 32px;
            padding: 14px 20px;
            background: var(--bg-card);
            border: 1px solid var(--success);
            border-radius: 10px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 200;
        }
        .toast i { color: var(--success); }
        @media (max-width: 600px) {
            .label-options { grid-template-columns: 1fr; }
            .stats-bar { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="module-select.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> 返回
            </a>
            <div class="page-title">
                <i class="fas fa-file-alt"></i>
                <span>文本情感分类</span>
            </div>
        </div>
        <div class="progress-chip">
            <span class="current" id="current-idx">0</span> / <span id="total-count">0</span>
        </div>
    </nav>

    <main class="main-container">
        <div class="stats-bar">
            <div class="stat-item">
                <div class="value blue" id="stat-total">0</div>
                <div class="label">总任务</div>
            </div>
            <div class="stat-item">
                <div class="value green" id="stat-done">0</div>
                <div class="label">已完成</div>
            </div>
            <div class="stat-item">
                <div class="value orange" id="stat-pending">0</div>
                <div class="label">待标注</div>
            </div>
        </div>

        <div class="task-card">
            <div class="loading" id="loading">
                <i class="fas fa-spinner"></i>
                <p>正在加载任务...</p>
            </div>

            <div id="task-content" style="display: none;">
                <div class="task-header">
                    <div class="task-num">
                        <span id="task-idx">1</span>
                        <span>请判断文本的情感倾向</span>
                    </div>
                    <div class="task-badge">情感分类</div>
                </div>

                <div class="text-box" id="text-content">
                    待标注文本...
                </div>

                <div class="label-section">
                    <h4>选择情感类型：</h4>
                    <div class="label-options">
                        <div class="label-btn positive" data-value="positive" onclick="selectLabel(this)">
                            <div class="icon"><i class="fas fa-smile"></i></div>
                            <div class="text">正面</div>
                        </div>
                        <div class="label-btn negative" data-value="negative" onclick="selectLabel(this)">
                            <div class="icon"><i class="fas fa-frown"></i></div>
                            <div class="text">负面</div>
                        </div>
                        <div class="label-btn neutral" data-value="neutral" onclick="selectLabel(this)">
                            <div class="icon"><i class="fas fa-meh"></i></div>
                            <div class="text">中性</div>
                        </div>
                    </div>
                </div>

                <div class="action-bar">
                    <button class="skip-btn" onclick="skipTask()">
                        <i class="fas fa-forward"></i> 跳过
                    </button>
                    <button class="submit-btn" id="submit-btn" onclick="submitLabel()" disabled>
                        <i class="fas fa-check"></i> 提交
                    </button>
                </div>
            </div>

            <div class="completed" id="completed" style="display: none;">
                <i class="fas fa-check-circle"></i>
                <p>所有任务已完成！</p>
                <button onclick="resetTasks()" class="btn" style="margin-right:10px;cursor:pointer;border:none;">重新开始</button>
                <a href="module-select.html" class="btn">返回标注中心</a>
            </div>

            <div class="empty" id="empty" style="display: none;">
                <i class="fas fa-inbox"></i>
                <p>暂无标注任务</p>
                <a href="module-select.html" class="btn">返回标注中心</a>
            </div>
        </div>
    </main>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span>标注成功！</span>
    </div>

    <script>
        const projectId = new URLSearchParams(window.location.search).get('project') || '2';
        let tasks = [];
        let currentIdx = 0;
        let selectedLabel = null;
        let usingSamples = false;

        // Fallback 示例文本
        const SAMPLE_TEXTS = [
            { id: 'sample-1', data: { text: '这家餐厅的服务非常好，菜品也很美味，下次还会再来！' }, is_labeled: false },
            { id: 'sample-2', data: { text: '等了半个小时才上菜，服务员态度也不好，非常失望。' }, is_labeled: false },
            { id: 'sample-3', data: { text: '今天天气不错，适合出去走走。' }, is_labeled: false },
            { id: 'sample-4', data: { text: '这款产品性价比很高，推荐购买！' }, is_labeled: false },
            { id: 'sample-5', data: { text: '物流太慢了，包装也破损了，差评！' }, is_labeled: false },
            { id: 'sample-6', data: { text: '电影院的座位还算舒适。' }, is_labeled: false },
            { id: 'sample-7', data: { text: '孩子们在公园里玩得很开心，看着他们的笑脸我也很幸福。' }, is_labeled: false },
            { id: 'sample-8', data: { text: '这次考试没考好，感觉很沮丧。' }, is_labeled: false },
            { id: 'sample-9', data: { text: '明天有个重要会议需要参加。' }, is_labeled: false }
        ];

        async function loadTasks() {
            try {
                const res = await fetch('/api/labeling/projects/' + projectId + '/tasks');
                if (!res.ok) throw new Error('API error');
                const data = await res.json();
                tasks = data.tasks || data;

                const total = tasks.length;
                const done = tasks.filter(t => t.is_labeled).length;

                document.getElementById('stat-total').textContent = total;
                document.getElementById('stat-done').textContent = done;
                document.getElementById('stat-pending').textContent = total - done;
                document.getElementById('total-count').textContent = total;

                // 找到第一个未标注的任务
                const pendingTasks = tasks.filter(t => !t.is_labeled);
                if (pendingTasks.length > 0) {
                    tasks = pendingTasks;
                    showTask();
                } else if (total > 0) {
                    showCompleted();
                } else {
                    // 使用示例数据
                    tasks = SAMPLE_TEXTS;
                    usingSamples = true;
                    document.getElementById('stat-total').textContent = tasks.length;
                    document.getElementById('stat-pending').textContent = tasks.length;
                    document.getElementById('total-count').textContent = tasks.length;
                    showTask();
                }
            } catch (e) {
                console.log('Using sample texts as fallback');
                tasks = SAMPLE_TEXTS;
                usingSamples = true;
                document.getElementById('stat-total').textContent = tasks.length;
                document.getElementById('stat-pending').textContent = tasks.length;
                document.getElementById('total-count').textContent = tasks.length;
                showTask();
            }
        }

        function showTask() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('completed').style.display = 'none';
            document.getElementById('empty').style.display = 'none';
            document.getElementById('task-content').style.display = 'block';

            const task = tasks[currentIdx];
            document.getElementById('task-idx').textContent = currentIdx + 1;
            document.getElementById('current-idx').textContent = currentIdx + 1;
            document.getElementById('text-content').textContent = task.data?.text || '无内容';

            selectedLabel = null;
            document.querySelectorAll('.label-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').innerHTML = '<i class="fas fa-check"></i> 提交';
        }

        function selectLabel(btn) {
            document.querySelectorAll('.label-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedLabel = btn.dataset.value;
            document.getElementById('submit-btn').disabled = false;
        }

        async function submitLabel() {
            if (!selectedLabel) return;

            const task = tasks[currentIdx];
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 提交中...';

            try {
                if (!usingSamples) {
                    await fetch('/api/labeling/tasks/' + task.id + '/submit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            result: [{ value: { choices: [selectedLabel] }, from_name: 'sentiment', to_name: 'text', type: 'choices' }]
                        })
                    });
                }

                // 更新统计
                const done = parseInt(document.getElementById('stat-done').textContent) + 1;
                const pending = parseInt(document.getElementById('stat-pending').textContent) - 1;
                document.getElementById('stat-done').textContent = done;
                document.getElementById('stat-pending').textContent = pending;

                showToast();

                currentIdx++;
                if (currentIdx < tasks.length) {
                    setTimeout(showTask, 500);
                } else {
                    showCompleted();
                }
            } catch (e) {
                console.error('Submit failed:', e);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check"></i> 提交';
            }
        }

        function skipTask() {
            currentIdx++;
            if (currentIdx >= tasks.length) currentIdx = 0;
            showTask();
        }

        function showCompleted() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('task-content').style.display = 'none';
            document.getElementById('empty').style.display = 'none';
            document.getElementById('completed').style.display = 'block';
        }

        function showEmpty() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('task-content').style.display = 'none';
            document.getElementById('completed').style.display = 'none';
            document.getElementById('empty').style.display = 'block';
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.display = 'flex';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        function resetTasks() {
            currentIdx = 0;
            document.getElementById('stat-done').textContent = '0';
            document.getElementById('stat-pending').textContent = tasks.length;
            document.getElementById('completed').style.display = 'none';
            showTask();
        }

        loadTasks();
    </script>
</body>
</html>
