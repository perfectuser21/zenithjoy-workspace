<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金诺AI - 语音标注</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f59e0b;
            --primary-light: #fbbf24;
            --bg-dark: #0f172a;
            --bg-darker: #020617;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
            --success: #22c55e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Inter, -apple-system, sans-serif; background: var(--bg-darker); color: var(--text-primary); min-height: 100vh; }
        .navbar { position: fixed; top: 0; left: 0; right: 0; height: 64px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; z-index: 100; }
        .nav-left { display: flex; align-items: center; gap: 24px; }
        .back-btn { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; }
        .back-btn:hover { color: var(--text-primary); background: var(--bg-card); }
        .page-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .page-title i { color: var(--primary); }
        .progress-chip { padding: 6px 14px; background: var(--bg-card); border-radius: 16px; font-size: 13px; color: var(--text-secondary); }
        .progress-chip .current { color: var(--primary-light); font-weight: 600; }
        .main-container { padding: 96px 32px 32px; max-width: 800px; margin: 0 auto; }
        .task-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
        .task-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
        .task-num { display: flex; align-items: center; gap: 12px; }
        .task-num span:first-child { width: 36px; height: 36px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #1a1a1a; }
        .task-badge { padding: 4px 12px; background: rgba(245, 158, 11, 0.15); color: var(--primary-light); border-radius: 12px; font-size: 12px; }
        .audio-box { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
        .audio-player { display: flex; align-items: center; gap: 16px; }
        .play-btn { width: 56px; height: 56px; background: linear-gradient(135deg, var(--primary), #d97706); border: none; border-radius: 50%; color: #1a1a1a; font-size: 20px; cursor: pointer; flex-shrink: 0; }
        .play-btn:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3); }
        .audio-info { flex: 1; }
        .audio-info .title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .audio-info .duration { font-size: 12px; color: var(--text-muted); }
        audio { display: none; }
        .input-section { margin-bottom: 20px; }
        .input-section h4 { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
        .input-section textarea { width: 100%; min-height: 100px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 10px; padding: 14px; font-size: 14px; color: var(--text-primary); resize: vertical; }
        .input-section textarea:focus { outline: none; border-color: var(--primary); }
        .emotion-section h4 { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
        .emotion-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
        .emotion-btn { padding: 14px 10px; background: var(--bg-dark); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; text-align: center; }
        .emotion-btn:hover { border-color: var(--text-muted); }
        .emotion-btn.selected { border-color: var(--primary); background: rgba(245, 158, 11, 0.1); }
        .emotion-btn .icon { font-size: 20px; margin-bottom: 6px; }
        .emotion-btn.happy .icon { color: #22c55e; }
        .emotion-btn.sad .icon { color: #3b82f6; }
        .emotion-btn.angry .icon { color: #ef4444; }
        .emotion-btn.neutral .icon { color: #64748b; }
        .emotion-btn .text { font-size: 12px; }
        .action-bar { display: flex; justify-content: space-between; padding-top: 20px; border-top: 1px solid var(--border); }
        .skip-btn { padding: 12px 20px; background: transparent; border: 1px solid var(--border); border-radius: 10px; color: var(--text-secondary); font-size: 14px; cursor: pointer; }
        .submit-btn { padding: 12px 28px; background: linear-gradient(135deg, var(--primary), #d97706); border: none; border-radius: 10px; color: #1a1a1a; font-size: 14px; font-weight: 600; cursor: pointer; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading, .completed, .empty { text-align: center; padding: 60px; }
        .loading i { font-size: 48px; color: var(--primary); animation: spin 1s linear infinite; }
        .completed i { font-size: 48px; color: var(--success); }
        .empty i { font-size: 48px; color: var(--text-muted); }
        .loading p, .completed p, .empty p { color: var(--text-secondary); margin-top: 16px; }
        .completed .btn, .empty .btn { display: inline-block; margin-top: 20px; padding: 12px 24px; background: var(--primary); color: #1a1a1a; text-decoration: none; border-radius: 10px; font-size: 14px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { position: fixed; top: 80px; right: 32px; padding: 14px 20px; background: var(--bg-card); border: 1px solid var(--success); border-radius: 10px; display: none; align-items: center; gap: 10px; z-index: 200; }
        .toast i { color: var(--success); }
        @media (max-width: 600px) { .emotion-options { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="module-select.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回</a>
            <div class="page-title"><i class="fas fa-microphone"></i><span>语音转写标注</span></div>
        </div>
        <div class="progress-chip"><span class="current" id="current-idx">0</span> / <span id="total-count">0</span></div>
    </nav>
    <main class="main-container">
        <div class="task-card">
            <div class="loading" id="loading"><i class="fas fa-spinner"></i><p>正在加载任务...</p></div>
            <div id="task-content" style="display: none;">
                <div class="task-header">
                    <div class="task-num"><span id="task-idx">1</span><span>听取音频并标注</span></div>
                    <div class="task-badge">语音标注</div>
                </div>
                <div class="audio-box">
                    <div class="audio-player">
                        <button class="play-btn" id="play-btn" onclick="toggleAudio()"><i class="fas fa-play" id="play-icon"></i></button>
                        <div class="audio-info"><div class="title">音频 #<span id="audio-num">1</span></div><div class="duration" id="duration">0:00</div></div>
                    </div>
                    <audio id="audio" onended="onAudioEnd()"></audio>
                </div>
                <div class="input-section">
                    <h4><i class="fas fa-keyboard"></i> 输入听到的内容：</h4>
                    <textarea id="transcription" placeholder="在此输入转写内容..." oninput="checkSubmit()"></textarea>
                </div>
                <div class="emotion-section">
                    <h4><i class="fas fa-theater-masks"></i> 选择说话者情感：</h4>
                    <div class="emotion-options">
                        <div class="emotion-btn happy" data-value="happy" onclick="selectEmotion(this)"><div class="icon"><i class="fas fa-smile"></i></div><div class="text">开心</div></div>
                        <div class="emotion-btn sad" data-value="sad" onclick="selectEmotion(this)"><div class="icon"><i class="fas fa-sad-tear"></i></div><div class="text">悲伤</div></div>
                        <div class="emotion-btn angry" data-value="angry" onclick="selectEmotion(this)"><div class="icon"><i class="fas fa-angry"></i></div><div class="text">愤怒</div></div>
                        <div class="emotion-btn neutral" data-value="neutral" onclick="selectEmotion(this)"><div class="icon"><i class="fas fa-meh"></i></div><div class="text">平静</div></div>
                    </div>
                </div>
                <div class="action-bar">
                    <button class="skip-btn" onclick="skipTask()"><i class="fas fa-forward"></i> 跳过</button>
                    <button class="submit-btn" id="submit-btn" onclick="submitLabel()" disabled><i class="fas fa-check"></i> 提交</button>
                </div>
            </div>
            <div class="completed" id="completed" style="display: none;"><i class="fas fa-check-circle"></i><p>所有任务已完成！</p><button onclick="resetTasks()" class="btn" style="margin-right:10px;cursor:pointer;border:none;">重新开始</button><a href="module-select.html" class="btn">返回</a></div>
            <div class="empty" id="empty" style="display: none;"><i class="fas fa-inbox"></i><p>暂无标注任务</p><a href="module-select.html" class="btn">返回</a></div>
        </div>
    </main>
    <div class="toast" id="toast"><i class="fas fa-check-circle"></i><span>标注成功！</span></div>
    <script>
        const projectId = new URLSearchParams(window.location.search).get('project') || '9';
        let tasks = [], currentIdx = 0, selectedEmotion = null, isPlaying = false;
        const audio = document.getElementById('audio');

        // Fallback 示例音频（使用绝对路径）
        const SAMPLE_AUDIOS = [
            { id: 'sample-1', data: { audio: '/ui/audio/sample3s.mp3' }, is_labeled: false },
            { id: 'sample-2', data: { audio: '/ui/audio/sample6s.mp3' }, is_labeled: false },
            { id: 'sample-3', data: { audio: '/ui/audio/sample9s.mp3' }, is_labeled: false },
            { id: 'sample-4', data: { audio: '/ui/audio/sample12s.mp3' }, is_labeled: false },
            { id: 'sample-5', data: { audio: '/ui/audio/song1.mp3' }, is_labeled: false }
        ];
        let usingSamples = false;

        async function loadTasks() {
            try {
                const res = await fetch('/api/labeling/projects/' + projectId + '/tasks');
                if (!res.ok) throw new Error('API error');
                const data = await res.json();
                tasks = (data.tasks || data).filter(t => !t.is_labeled);
                if (tasks.length === 0) { tasks = SAMPLE_AUDIOS; usingSamples = true; }
                document.getElementById('total-count').textContent = tasks.length;
                if (tasks.length > 0) showTask(); else showEmpty();
            } catch (e) {
                console.log('Using sample audios as fallback');
                tasks = SAMPLE_AUDIOS;
                usingSamples = true;
                document.getElementById('total-count').textContent = tasks.length;
                showTask();
            }
        }

        function showTask() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('task-content').style.display = 'block';
            const task = tasks[currentIdx];
            document.getElementById('task-idx').textContent = currentIdx + 1;
            document.getElementById('current-idx').textContent = currentIdx + 1;
            document.getElementById('audio-num').textContent = currentIdx + 1;
            const url = task.data?.audio || task.data?.url;
            if (url) { audio.src = url; audio.load(); audio.onloadedmetadata = () => { document.getElementById('duration').textContent = formatTime(audio.duration); }; }
            document.getElementById('transcription').value = '';
            selectedEmotion = null;
            document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').innerHTML = '<i class="fas fa-check"></i> 提交';
            isPlaying = false;
            document.getElementById('play-icon').className = 'fas fa-play';
        }

        function toggleAudio() { if (isPlaying) { audio.pause(); document.getElementById('play-icon').className = 'fas fa-play'; } else { audio.play(); document.getElementById('play-icon').className = 'fas fa-pause'; } isPlaying = !isPlaying; }
        function onAudioEnd() { isPlaying = false; document.getElementById('play-icon').className = 'fas fa-play'; }
        function formatTime(s) { return Math.floor(s/60) + ':' + (Math.floor(s%60)+'').padStart(2,'0'); }
        function selectEmotion(btn) { document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); selectedEmotion = btn.dataset.value; checkSubmit(); }
        function checkSubmit() { document.getElementById('submit-btn').disabled = !(document.getElementById('transcription').value.trim() && selectedEmotion); }

        async function submitLabel() {
            const transcription = document.getElementById('transcription').value.trim();
            if (!transcription || !selectedEmotion) return;
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            try {
                if (!usingSamples) {
                    await fetch('/api/labeling/tasks/' + tasks[currentIdx].id + '/submit', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ result: [{ value: { text: [transcription] }, from_name: 'transcription', to_name: 'audio', type: 'textarea' }, { value: { choices: [selectedEmotion] }, from_name: 'emotion', to_name: 'audio', type: 'choices' }] })
                    });
                }
                showToast();
                currentIdx++;
                if (currentIdx < tasks.length) setTimeout(showTask, 500); else showCompleted();
            } catch (e) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check"></i> 提交';
            }
        }

        function skipTask() { audio.pause(); isPlaying = false; document.getElementById('play-icon').className = 'fas fa-play'; currentIdx = (currentIdx + 1) % tasks.length; showTask(); }
        function showCompleted() { document.getElementById('loading').style.display = 'none'; document.getElementById('task-content').style.display = 'none'; document.getElementById('completed').style.display = 'block'; }
        function showEmpty() { document.getElementById('loading').style.display = 'none'; document.getElementById('task-content').style.display = 'none'; document.getElementById('empty').style.display = 'block'; }
        function showToast() { const t = document.getElementById('toast'); t.style.display = 'flex'; setTimeout(() => t.style.display = 'none', 2000); }
        function resetTasks() { currentIdx = 0; document.getElementById('completed').style.display = 'none'; showTask(); }
        loadTasks();
    </script>
</body>
</html>
